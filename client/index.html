<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Viewport - prevents zoom on input focus (mobile) -->
    <meta name="viewport" 
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- Theme color - changes Android status bar -->
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="color-scheme" content="dark light" />
    
    <!-- iOS specific -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NUVLYX" />
    
    <!-- Microsoft / Windows -->
    <meta name="msapplication-TileColor" content="#d4af37" />
    
    <!-- SEO -->
    <meta name="description" content="NUVLYX POS - Modern point-of-sale for cafés and restaurants in Nepal" />
    
    <title>NUVLYX POS</title>
  </head>
